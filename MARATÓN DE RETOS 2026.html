<!DOCTYPE html>

<head>

    <title>Maratón 2D · Carrera de atleta</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            overflow: hidden;
            background: #1a3b2e;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            touch-action: pan-y pinch-zoom;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #1a3b2e;
            cursor: none;
        }
        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: background 0.2s, opacity 0.2s;
        }
        .fullscreen-btn:hover,
        .fullscreen-btn:active {
            background: rgba(0,0,0,0.7);
        }
        .fullscreen-btn.fade {
            opacity: 0.3;
        }
        .fullscreen-btn svg {
            width: 28px;
            height: 28px;
            stroke: white;
            stroke-width: 2.2;
            stroke-linecap: round;
            fill: none;
        }
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1d4d33;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            z-index: 20;
            transition: opacity 0.5s;
        }
    </style>
</head>

            // --- DETECCIÓN DE SPRITES (igual) ---
            function detectSpriteFrames(img) {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = img.naturalWidth;
                tempCanvas.height = img.naturalHeight;
                tempCtx.drawImage(img, 0, 0);
                
                const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                const data = imageData.data;
                const w = tempCanvas.width;
                const h = tempCanvas.height;
                
                const ALPHA_THRESHOLD = 50;
                const visited = new Array(w * h).fill(false);
                
                const isOpaque = (x, y) => {
                    if (x < 0 || x >= w || y < 0 || y >= h) return false;
                    const index = (y * w + x) * 4 + 3;
                    return data[index] >= ALPHA_THRESHOLD;
                };
                
                const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
                const rects = [];
                
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const idx = y * w + x;
                        if (!visited[idx] && isOpaque(x, y)) {
                            const queue = [[x, y]];
                            visited[idx] = true;
                            
                            let minX = x, maxX = x, minY = y, maxY = y;
                            
                            while (queue.length > 0) {
                                const [cx, cy] = queue.shift();
                                
                                if (cx < minX) minX = cx;
                                if (cx > maxX) maxX = cx;
                                if (cy < minY) minY = cy;
                                if (cy > maxY) maxY = cy;
                                
                                for (const [dx, dy] of dirs) {
                                    const nx = cx + dx;
                                    const ny = cy + dy;
                                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                        const nidx = ny * w + nx;
                                        if (!visited[nidx] && isOpaque(nx, ny)) {
                                            visited[nidx] = true;
                                            queue.push([nx, ny]);
                                        }
                                    }
                                }
                            }
                            
                            rects.push({
                                x: minX,
                                y: minY,
                                width: maxX - minX + 1,
                                height: maxY - minY + 1
                            });
                        }
                    }
                }
                
                const minArea = 100;
                const filtered = rects.filter(r => r.width * r.height >= minArea);
                filtered.sort((a, b) => a.x - b.x);
                return filtered;
            }

            // --- FUNCIÓN PARA DIVIDIR TEXTO EN LÍNEAS ---
            function wrapText(text, maxWidth, fontSize) {
                ctx.save();
                ctx.font = `bold ${fontSize}px "Segoe UI", sans-serif`;
                const words = text.split(' ');
                const lines = [];
                let currentLine = words[0];

                for (let i = 1; i < words.length; i++) {
                    const testLine = currentLine + ' ' + words[i];
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width < maxWidth) {
                        currentLine = testLine;
                    } else {
                        lines.push(currentLine);
                        currentLine = words[i];
                    }
                }
                lines.push(currentLine);
                ctx.restore();
                return lines;
            }

                reverseLightning.active = false;
                reverseLightningTriggered = false;

                quizPointIndex = index;
                if (index % 2 === 0) { // principal
                    let mainIndex = index / 2; // 0,1,2,3,4
                    if (mainIndex < mainAnswers.length) {
                        quizQuestions = mainAnswers[mainIndex];
                        if (quizTexts[index]) {
                            quizTextData = quizTexts[index];
                        } else {
                            quizTextData = quizQuestions.map((_, i) => ({
                                question: `Pregunta ${i+1} del punto ${index}`,
                                options: [
                                    "A) Opción A",
                                    "B) Opción B",
                                    "C) Opción C",
                                    "D) Opción D"
                                ]
                            }));
                        }
                    } else {
                        quizQuestions = ['C', 'C', 'A', 'B'];
                        quizTextData = quizQuestions.map((_, i) => ({
                            question: `Pregunta ${i+1}`,
                            options: ["A)", "B)", "C)", "D)"]
                        }));
                    }
                } else { // intermedio
                    let interIndex = (index - 1) / 2; // 0,1,2,3
                    if (interIndex < interAnswers.length) {
                        quizQuestions = interAnswers[interIndex];
                        if (quizTexts[index]) {
                            quizTextData = quizTexts[index];
                        } else {
                            quizTextData = [{
                                question: `Pregunta del punto intermedio ${index}`,
                                options: [
                                    "A) Opción A",
                                    "B) Opción B",
                                    "C) Opción C",
                                    "D) Opción D"
                                ]
                            }];
                        }
                    } else {
                        quizQuestions = ['B'];
                        quizTextData = [{
                            question: "Pregunta",
                            options: ["A)", "B)", "C)", "D)"]
                        }];
                    }
                }
                quizUserAnswers = new Array(quizQuestions.length).fill(null);
                quizCurrentIndex = 0;
                quizCorrectCount = 0;
                quizActive = true;
                quizFinished = false;

                let extraTime = 0;
                quizTextData.forEach(q => {
                    const estimatedLines = Math.ceil(q.question.length / 50);
                    if (estimatedLines > 2) {
                        extraTime += (estimatedLines - 2) * 2;
                    }
                });
                MAX_TIME = 60 + extraTime;
                timeLeft = MAX_TIME;

                timerActive = true;
                lastTimestamp = performance.now();
                penaltyActive = false;
            }

            function handleAnswerSelection(selectedLetter) {
                if (!quizActive) return;
                if (quizCurrentIndex >= quizQuestions.length) return;
                if (quizTransitionActive) return;
                if (penaltyActive) return;
                if (feedback.active) return;
                if (lightningAnim.active || reverseLightning.active) return;

                const currentIndex = quizCurrentIndex;
                const correctLetter = quizQuestions[currentIndex];
                const selectedIndex = selectedLetter.charCodeAt(0) - 'A'.charCodeAt(0);
                const correctIndex = correctLetter.charCodeAt(0) - 'A'.charCodeAt(0);

                feedback.active = true;
                feedback.correctIndex = correctIndex;
                feedback.selectedIndex = selectedIndex;
                feedback.selectedLetter = selectedLetter;
                feedback.startTime = performance.now();

                if (selectedLetter === correctLetter) {
                    feedback.callback = () => {
                        const startX = 100;
                        const optionHeight = 58;
                        const questionTotalHeight = questionLines.length * questionLineHeight;
                        const startY = 45 + questionTotalHeight + 25;
                        const fromX = startX + 300;
                        const fromY = startY + selectedIndex * optionHeight + optionHeight/2;

                        const margin = 20;
                        const iconSize = 40;
                        const toX = CANVAS_W - margin - iconSize/2;
                        const toY = margin + iconSize/2;

                        startLightning(fromX, fromY, toX, toY, () => {
                            applyAnswer(selectedLetter, true);
                        });
                    };
                } else {
                    feedback.callback = () => {
                        applyAnswer(selectedLetter, false);
                    };
                }
            }

            function startLightning(fromX, fromY, toX, toY, callback) {
                lightningAnim.active = true;
                lightningAnim.fromX = fromX;
                lightningAnim.fromY = fromY;
                lightningAnim.toX = toX;
                lightningAnim.toY = toY;
                lightningAnim.progress = 0;
                lightningAnim.callback = callback;
            }

            function startReverseLightning(fromX, fromY, toX, toY, callback) {
                reverseLightning.active = true;
                reverseLightning.fromX = fromX;
                reverseLightning.fromY = fromY;
                reverseLightning.toX = toX;
                reverseLightning.toY = toY;
                reverseLightning.progress = 0;
                reverseLightning.callback = callback;
            }

            function applyAnswer(selectedLetter, isCorrect) {
                if (!quizActive) return;
                if (quizCurrentIndex >= quizQuestions.length) return;

                quizUserAnswers[quizCurrentIndex] = selectedLetter;

                if (isCorrect) {
                    quizCorrectCount++;
                    targetEnergy += 10;
                }

                if (quizCurrentIndex + 1 < quizQuestions.length) {
                    startTransition(quizCurrentIndex, quizCurrentIndex + 1, selectedLetter);
                } else {
                    quizCurrentIndex++;
                    finishQuiz();
                }
            }

            function startTransition(outgoingIdx, incomingIdx, answer) {
                quizTransitionActive = true;
                quizTransitionProgress = 0;
                quizTransitionOutgoingIndex = outgoingIdx;
                quizTransitionIncomingIndex = incomingIdx;
                quizTransitionOutgoingAnswer = answer;

                const startTime = performance.now();
                function animateTransition(now) {
                    const elapsed = now - startTime;
                    quizTransitionProgress = Math.min(elapsed / TRANSITION_DURATION, 1);
                    if (quizTransitionProgress < 1) {
                        requestAnimationFrame(animateTransition);
                    } else {
                        quizTransitionActive = false;
                        quizCurrentIndex = incomingIdx;
                    }
                }
                requestAnimationFrame(animateTransition);
            }

            function finishQuiz() {
                quizActive = false;
                timerActive = false;
                const total = quizQuestions.length;
                const aciertos = quizCorrectCount;
                let tipo = null;
                let direccion = 'derecha';

                if (quizPointIndex % 2 === 0) {
                    if (aciertos === 0) {
                        tipo = 'simple';
                    } else if (aciertos === 2) {
                        tipo = 'double';
                    } else if (aciertos === 4) {
                        tipo = 'hold';
                    } else {
                        tipo = 'simple';
                    }
                } else {
                    if (aciertos === 0) {
                        tipo = 'simple';
                        direccion = 'izquierda';
                    } else if (aciertos === 1) {
                        tipo = 'double';
                    } else {
                        tipo = 'simple';
                    }
                }

                pendingMove = { tipo, direccion };
                startEnergyConsumption();
            }

            function startEnergyConsumption() {
                if (targetEnergy <= 0) {
                    executePendingMove();
                    return;
                }
                isConsuming = true;
                energyConsumeRate = targetEnergy / 120;
            }

            function executePendingMove() {
                if (!pendingMove) return;
                const { tipo, direccion } = pendingMove;
                pendingMove = null;
                isConsuming = false;

                if (tipo === 'simple' && direccion === 'derecha') {
                    setTimeout(() => {
                        startQuizForPoint(quizPointIndex);
                    }, 2000);
                    return;
                }

                let nuevoIndice = quizPointIndex;
                if (direccion === 'derecha') {
                    if (tipo === 'double') {
                        if (quizPointIndex % 2 === 0) {
                            if (quizPointIndex + 1 < points.length) nuevoIndice = quizPointIndex + 1;
                        } else {
                            if (quizPointIndex + 1 < points.length) nuevoIndice = quizPointIndex + 1;
                        }
                    } else if (tipo === 'hold') {
                        if (quizPointIndex % 2 === 0) {
                            if (quizPointIndex + 2 < points.length) nuevoIndice = quizPointIndex + 2;
                        } else {
                            if (quizPointIndex + 1 < points.length) nuevoIndice = quizPointIndex + 1;
                        }
                    }
                } else {
                    if (tipo === 'simple') {
                        if (quizPointIndex % 2 === 1) {
                            if (quizPointIndex - 1 >= 0) nuevoIndice = quizPointIndex - 1;
                        }
                    } else if (tipo === 'double') {
                        if (quizPointIndex % 2 === 0) {
                            if (quizPointIndex - 1 >= 0) nuevoIndice = quizPointIndex - 1;
                        } else {
                            if (quizPointIndex - 1 >= 0) nuevoIndice = quizPointIndex - 1;
                        }
                    } else if (tipo === 'hold') {
                        if (quizPointIndex % 2 === 0) {
                            if (quizPointIndex - 2 >= 0) nuevoIndice = quizPointIndex - 2;
                        } else {
                            if (quizPointIndex - 1 >= 0) nuevoIndice = quizPointIndex - 1;
                        }
                    }
                }

                if (nuevoIndice !== quizPointIndex && nuevoIndice >= 0 && nuevoIndice < points.length) {
                    targetPointIndex = nuevoIndice;
                    isMoving = true;
                    movingLeft = (direccion === 'izquierda');
                    movingRight = (direccion === 'derecha');
                    facingLeft = movingLeft;
                }
            }

            // --- MANEJO DE TOQUES EN EL CANVAS (adaptado para menú y selección) ---
            function handleCanvasTouch(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const canvasX = (clientX - rect.left) * scaleX;
                const canvasY = (clientY - rect.top) * scaleY;

                if (gameState === 'menu') {
                    // Cualquier toque pasa a selección de personajes
                    gameState = 'characterSelect';
                } else if (gameState === 'characterSelect') {
                    // Detectar toque en los iconos (4 en fila)
                    const iconSize = 80;
                    const startX = (CANVAS_W - 4 * iconSize - 3 * 20) / 2;
                    const startY = 150;
                    const spacing = iconSize + 20;
                    for (let i = 0; i < 4; i++) {
                        const x = startX + i * spacing;
                        const y = startY;
                        if (canvasX >= x && canvasX < x + iconSize && canvasY >= y && canvasY < y + iconSize) {
                            characterSelectIndex = i;
                            break;
                        }
                    }
                    // Detectar toque en el botón "SELECCIONAR"
                    const btnX = 250;
                    const btnY = 300;
                    const btnW = 300;
                    const btnH = 60;
                    if (canvasX >= btnX && canvasX < btnX + btnW && canvasY >= btnY && canvasY < btnY + btnH) {
                        if (characterSelectIndex !== -1) {
                            const colors = ['Blue', 'Red', 'Yellow', 'Green'];
                            selectedColor = colors[characterSelectIndex];
                            playerSpriteImg.src = 'playerMan' + selectedColor + '.png';
                            playerSpriteImg.onload = () => {
                                spriteFrames = detectSpriteFrames(playerSpriteImg);
                                if (spriteFrames.length !== 2) {
                                    const totalW = playerSpriteImg.naturalWidth;
                                    const halfW = Math.floor(totalW / 2);
                                    spriteFrames = [
                                        { x: 0, y: 0, width: halfW, height: playerSpriteImg.naturalHeight },
                                        { x: halfW, y: 0, width: totalW - halfW, height: playerSpriteImg.naturalHeight }
                                    ];
                                }
                                if (spriteFrames.length > 0) {
                                    const rect = spriteFrames[0];
                                    player.width = (rect.width / rect.height) * PLAYER_HEIGHT;
                                }
                                gameState = 'playing';
                                player.x = points[0].x - player.width / 2;
                                currentPointIndex = 0;
                                targetPointIndex = 0;
                                energy = 0;
                                targetEnergy = 0;
                                isMoving = false;
                                quizActive = false;
                                quizFinished = false;
                                penaltyActive = false;
                                timerActive = false;
                            };
                            playerSpriteImg.onerror = () => {
                                console.warn('No se pudo cargar el sprite del personaje');
                                playerSpriteImg.src = 'playerManBlue.png';
                            };
                        }
                    }
                } else if (gameState === 'playing') {
                    if (!quizActive) return;
                    if (quizTransitionActive) return;
                    if (penaltyActive) return;
                    if (feedback.active) return;
                    if (lightningAnim.active || reverseLightning.active) return;

                    const optionHeight = 58;
                    const startX = 100;
                    const optionWidth = 600;
                    const questionTotalHeight = questionLines.length * questionLineHeight;
                    const startY = 45 + questionTotalHeight + 25;

                    for (let i = 0; i < 4; i++) {
                        const y = startY + i * optionHeight;
                        if (canvasY >= y && canvasY < y + optionHeight && canvasX >= startX && canvasX < startX + optionWidth) {
                            const letras = ['A', 'B', 'C', 'D'];
                            handleAnswerSelection(letras[i]);
                            break;
                        }
                    }
                } else if (gameState === 'victory') {
                    gameState = 'menu';
                    characterSelectIndex = -1;
                    selectedColor = null;
                }
            }

            canvas.addEventListener('touchstart', handleCanvasTouch, { passive: false });
            canvas.addEventListener('mousedown', handleCanvasTouch);

            // --- LÓGICA DE MOVIMIENTO Y CÁMARA (solo en playing) ---
            function update() {
                if (gameState !== 'playing') return;

                const previousFrame = currentFrame;

                if (timerActive) {
                    const now = performance.now();
                    const delta = (now - lastTimestamp) / 1000;
                    lastTimestamp = now;
                    timeLeft -= delta;
                    if (timeLeft <= 0) {
                        timeLeft = 0;
                        timerActive = false;
                        quizActive = false;
                        quizTransitionActive = false;
                        penaltyActive = true;
                        penaltyTimeLeft = PENALTY_DURATION;
                        lastTimestamp = now;
                    }
                }

                if (penaltyActive) {
                    const now = performance.now();
                    const delta = (now - lastTimestamp) / 1000;
                    lastTimestamp = now;
                    penaltyTimeLeft -= delta;
                    if (penaltyTimeLeft <= 0) {
                        penaltyActive = false;
                        startQuizForPoint(quizPointIndex);
                    }
                }

                if (feedback.active) {
                    const now = performance.now();
                    if (now - feedback.startTime >= feedback.duration) {
                        feedback.active = false;
                        if (feedback.callback) {
                            feedback.callback();
                            feedback.callback = null;
                        }
                    }
                }

                if (lightningAnim.active) {
                    lightningAnim.progress += 0.02;
                    if (lightningAnim.progress >= 1) {
                        lightningAnim.active = false;
                        if (lightningAnim.callback) {
                            lightningAnim.callback();
                            lightningAnim.callback = null;
                        }
                    }
                }

                if (reverseLightning.active) {
                    reverseLightning.progress += 0.02;
                    if (reverseLightning.progress >= 1) {
                        reverseLightning.active = false;
                        if (reverseLightning.callback) {
                            reverseLightning.callback();
                            reverseLightning.callback = null;
                        }
                    }
                }

                if (isMoving) {
                    let targetX = points[targetPointIndex].x - player.width / 2;
                    let dx = targetX - player.x;
                    let step = PLAYER_SPEED;
                    if (Math.abs(dx) <= step) {
                        player.x = targetX;
                        isMoving = false;
                        movingLeft = false;
                        movingRight = false;
                        currentPointIndex = targetPointIndex;
                    } else {
                        player.x += (dx > 0 ? step : -step);
                    }
                } else {
                    movingLeft = false;
                    movingRight = false;
                }

                if (!isMoving && !quizActive && !isConsuming && !pendingMove && !quizFinished && !penaltyActive) {
                    startQuizForPoint(currentPointIndex);
                }

                if (isConsuming && targetEnergy > 0) {
                    targetEnergy -= energyConsumeRate;
                    if (targetEnergy < 0) targetEnergy = 0;
                    if (targetEnergy <= 0) {
                        targetEnergy = 0;
                        const noMovement = pendingMove && pendingMove.tipo === 'simple' && pendingMove.direccion === 'derecha';
                        if (!noMovement && !reverseLightning.active && !reverseLightningTriggered) {
                            reverseLightningTriggered = true;
                            const margin = 20;
                            const iconSize = 40;
                            const fromX = CANVAS_W - margin - iconSize/2;
                            const fromY = margin + iconSize/2;
                            const playerCanvasX = player.x - cameraX + player.width/2;
                            const playerCanvasY = player.y + player.height/2;
                            startReverseLightning(fromX, fromY, playerCanvasX, playerCanvasY, () => {
                                reverseLightningTriggered = false;
                                executePendingMove();
                            });
                        } else {
                            executePendingMove();
                        }
                    }
                }

                energy += (targetEnergy - energy) * 0.1;

                if (movingLeft && !movingRight) {
                    currentFrame = 1;
                    facingLeft = true;
                } else if (movingRight && !movingLeft) {
                    currentFrame = 1;
                    facingLeft = false;
                } else {
                    currentFrame = 0;
                }

                if (previousFrame !== currentFrame && spriteFrames.length > currentFrame) {
                    const rect = spriteFrames[currentFrame];
                    const newWidth = (rect.width / rect.height) * PLAYER_HEIGHT;
                    const centerX = player.x + player.width / 2;
                    player.width = newWidth;
                    player.x = centerX - player.width / 2;
                }

                if (player.x < 0) player.x = 0;
                if (player.x + player.width > worldWidth) player.x = worldWidth - player.width;

                let targetCamX;
                if (!facingLeft) {
                    targetCamX = player.x + player.width / 2 - CANVAS_W / 3;
                } else {
                    targetCamX = player.x + player.width / 2 - 2 * CANVAS_W / 3;
                }
                targetCamX = Math.max(0, Math.min(targetCamX, worldWidth - CANVAS_W));
                cameraX = targetCamX;
            }

            // --- DIBUJADO ---
            function draw() {
                ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

                if (gameState === 'menu') {
                    if (menuImg.complete && menuImg.naturalWidth > 0) {
                        ctx.drawImage(menuImg, 0, 0, CANVAS_W, CANVAS_H);
                    } else {
                        ctx.fillStyle = '#2a5f3a';
                        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                        ctx.font = 'bold 36px sans-serif';
                        ctx.fillStyle = 'white';
                        ctx.fillText('MARATÓN 2D', 200, 200);
                        ctx.font = '24px sans-serif';
                        ctx.fillText('Toca para comenzar', 250, 300);
                    }
                    return;
                }

                if (gameState === 'characterSelect') {
                    ctx.fillStyle = '#2a5f3a';
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                    
                    ctx.font = 'bold 32px sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.fillText('Selecciona tu personaje', 150, 80);

                    const iconSize = 80;
                    const startX = (CANVAS_W - 4 * iconSize - 3 * 20) / 2;
                    const startY = 150;
                    const spacing = iconSize + 20;
                    const icons = [iconBlue, iconRed, iconYellow, iconGreen];
                    for (let i = 0; i < 4; i++) {
                        const x = startX + i * spacing;
                        const y = startY;
                        if (icons[i].complete && icons[i].naturalWidth > 0) {
                            ctx.drawImage(icons[i], x, y, iconSize, iconSize);
                        } else {
                            ctx.fillStyle = '#888';
                            ctx.fillRect(x, y, iconSize, iconSize);
                        }
                        if (characterSelectIndex === i) {
                            ctx.strokeStyle = '#FFD700';
                            ctx.lineWidth = 6;
                            ctx.strokeRect(x-3, y-3, iconSize+6, iconSize+6);
                        }
                    }

                    const btnX = 250;
                    const btnY = 300;
                    const btnW = 300;
                    const btnH = 60;
                    ctx.fillStyle = characterSelectIndex !== -1 ? '#4CAF50' : '#888';
                    ctx.fillRect(btnX, btnY, btnW, btnH);
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(btnX, btnY, btnW, btnH);
                    ctx.font = 'bold 28px sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.fillText('SELECCIONAR', btnX + 40, btnY + 45);

                    return;
                }

                if (gameState === 'victory') {
                    if (victoryImage && victoryImage.complete && victoryImage.naturalWidth > 0) {
                        ctx.drawImage(victoryImage, 0, 0, CANVAS_W, CANVAS_H);
                    } else {
                        ctx.fillStyle = '#000';
                        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                        ctx.font = 'bold 36px sans-serif';
                        ctx.fillStyle = 'gold';
                        ctx.fillText('¡VICTORIA!', 250, 200);
                    }
                    ctx.font = '20px sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.fillText('Toca para volver al menú', 250, 350);
                    return;
                }

                // --- A partir de aquí, gameState === 'playing' ---
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                // Fondo
                if (backgroundImg.complete && backgroundImg.naturalWidth > 0) {
                    let offsetY = 0;
                    if (backgroundImg.naturalHeight > CANVAS_H) {
                        offsetY = backgroundImg.naturalHeight - CANVAS_H;
                    }
                    ctx.drawImage(
                        backgroundImg,
                        cameraX, offsetY, CANVAS_W, CANVAS_H,
                        0, 0, CANVAS_W, CANVAS_H
                    );
                } else {
                    const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
                    grad.addColorStop(0, '#86b486');
                    grad.addColorStop(0.7, '#5b8c5a');
                    grad.addColorStop(1, '#3f6140');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                    ctx.strokeStyle = '#fff3c9';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([20, 30]);
                    ctx.beginPath();
                    ctx.moveTo(0, GROUND_Y + PLAYER_HEIGHT - 10);
                    ctx.lineTo(CANVAS_W, GROUND_Y + PLAYER_HEIGHT - 10);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Personaje
                if (playerSpriteImg && playerSpriteImg.complete && playerSpriteImg.naturalWidth > 0 && spriteFrames.length > currentFrame) {
                    const rect = spriteFrames[currentFrame];
                    
                    ctx.save();
                    ctx.translate(player.x - cameraX, player.y);
                    
                    if (facingLeft) {
                        ctx.scale(-1, 1);
                        ctx.translate(-player.width, 0);
                    }
                    
                    ctx.drawImage(
                        playerSpriteImg,
                        rect.x, rect.y, rect.width, rect.height,
                        0, 0, player.width, player.height
                    );
                    
                    ctx.restore();
                } else {
                    ctx.fillStyle = currentFrame === 0 ? '#2b7ddd' : '#dd3b2b';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 10;
                    ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
                    ctx.shadowBlur = 0;
                    ctx.font = 'bold 24px monospace';
                    ctx.fillStyle = 'white';
                    ctx.fillText(currentFrame === 0 ? '😐' : '🏃', player.x - cameraX + 15, player.y + 50);
                }

                // Sombra
                ctx.fillStyle = '#1e2b1e80';
                ctx.beginPath();
                ctx.ellipse(player.x - cameraX + player.width/2, player.y + player.height - 6, player.width/3, 8, 0, 0, Math.PI*2);
                ctx.fill();

                // --- DIBUJO DEL QUIZ (con texto ajustado) ---
                if (quizActive || quizTransitionActive) {
                    // Fondo oscuro
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

                    const startX = 100;
                    const optionWidth = 600;
                    const optionHeight = 58;
                    const fontSizeQuestion = 18;

                    if (quizTransitionActive) {
                        // Dibujar pregunta saliente (outgoing)
                        const outProgress = quizTransitionProgress;
                        ctx.save();
                        const outX = -outProgress * 200;
                        const outScale = 1 - outProgress * 0.2;
                        const outAlpha = 1 - outProgress;
                        ctx.translate(outX, 0);
                        ctx.scale(outScale, outScale);
                        ctx.globalAlpha = outAlpha;

                        const outData = quizTextData[quizTransitionOutgoingIndex];
                        const outLines = wrapText(outData.question, questionMaxWidth, fontSizeQuestion);
                        const outQuestionHeight = outLines.length * questionLineHeight;

                        ctx.font = `bold ${fontSizeQuestion}px "Segoe UI", sans-serif`;
                        ctx.fillStyle = 'white';
                        let lineY = 45;
                        for (let line of outLines) {
                            ctx.fillText(line, startX, lineY);
                            lineY += questionLineHeight;
                        }
                        ctx.font = '16px "Segoe UI", sans-serif';
                        ctx.fillText(`Pregunta ${quizTransitionOutgoingIndex+1} de ${quizQuestions.length}`, startX, lineY + 10);

                        const optionsStartY = lineY + 25;
                        for (let i = 0; i < 4; i++) {
                            const y = optionsStartY + i * optionHeight;
                            ctx.fillStyle = '#3a6ea5';
                            ctx.fillRect(startX, y, optionWidth, optionHeight-5);
                            ctx.strokeStyle = 'white';
                            ctx.lineWidth = 3;
                            ctx.strokeRect(startX, y, optionWidth, optionHeight-5);
                            ctx.font = 'bold 15px "Segoe UI", sans-serif';
                            ctx.fillStyle = 'white';
                            ctx.fillText(outData.options[i], startX + 20, y + 40);
                        }
                        ctx.restore();

                        // Dibujar pregunta entrante (incoming)
                        ctx.save();
                        const inProgress = quizTransitionProgress;
                        const inX = (1 - inProgress) * 200;
                        const inScale = 0.8 + inProgress * 0.2;
                        const inAlpha = inProgress;
                        ctx.translate(inX, 0);
                        ctx.scale(inScale, inScale);
                        ctx.globalAlpha = inAlpha;

                        const inData = quizTextData[quizTransitionIncomingIndex];
                        const inLines = wrapText(inData.question, questionMaxWidth, fontSizeQuestion);
                        const inQuestionHeight = inLines.length * questionLineHeight;

                        ctx.font = `bold ${fontSizeQuestion}px "Segoe UI", sans-serif`;
                        ctx.fillStyle = 'white';
                        lineY = 45;
                        for (let line of inLines) {
                            ctx.fillText(line, startX, lineY);
                            lineY += questionLineHeight;
                        }
                        ctx.font = '16px "Segoe UI", sans-serif';
                        ctx.fillText(`Pregunta ${quizTransitionIncomingIndex+1} de ${quizQuestions.length}`, startX, lineY + 10);

                        const optionsStartYin = lineY + 25;
                        for (let i = 0; i < 4; i++) {
                            const y = optionsStartYin + i * optionHeight;
                            ctx.fillStyle = '#3a6ea5';
                            ctx.fillRect(startX, y, optionWidth, optionHeight-5);
                            ctx.strokeStyle = 'white';
                            ctx.lineWidth = 3;
                            ctx.strokeRect(startX, y, optionWidth, optionHeight-5);
                            ctx.font = 'bold 15px "Segoe UI", sans-serif';
                            ctx.fillStyle = 'white';
                            ctx.fillText(inData.options[i], startX + 20, y + 40);
                        }
                        ctx.restore();

                        questionLines = inLines;
                        questionHeight = inQuestionHeight;
                    } else {
                        // Quiz activo sin transición
                        const currentData = quizTextData[quizCurrentIndex];
                        questionLines = wrapText(currentData.question, questionMaxWidth, fontSizeQuestion);
                        questionHeight = questionLines.length * questionLineHeight;

                        ctx.font = `bold ${fontSizeQuestion}px "Segoe UI", sans-serif`;
                        ctx.fillStyle = 'white';
                        let lineY = 45;
                        for (let line of questionLines) {
                            ctx.fillText(line, startX, lineY);
                            lineY += questionLineHeight;
                        }
                        ctx.font = '16px "Segoe UI", sans-serif';
                        ctx.fillText(`Pregunta ${quizCurrentIndex+1} de ${quizQuestions.length}`, startX, lineY + 10);

                        const optionsStartY = lineY + 25;
                        for (let i = 0; i < 4; i++) {
                            const y = optionsStartY + i * optionHeight;
                            if (feedback.active) {
                                if (i === feedback.correctIndex) {
                                    ctx.fillStyle = '#2e8b57';
                                } else if (feedback.selectedIndex !== feedback.correctIndex) {
                                    ctx.fillStyle = '#b22222';
                                } else {
                                    ctx.fillStyle = '#3a6ea5';
                                }
                            } else {
                                ctx.fillStyle = '#3a6ea5';
                            }
                            ctx.fillRect(startX, y, optionWidth, optionHeight-5);
                            ctx.strokeStyle = 'white';
                            ctx.lineWidth = 3;
                            ctx.strokeRect(startX, y, optionWidth, optionHeight-5);
                            ctx.font = 'bold 15px "Segoe UI", sans-serif';
                            ctx.fillStyle = 'white';
                            ctx.fillText(currentData.options[i], startX + 20, y + 40);
                        }
                    }

                    // --- DIBUJO DEL RELOJ (lado izquierdo) Y BARRA VERTICAL ---
                    if (quizActive) {
                        const relojX = 50;
                        const relojY = 60;
                        const radio = 25;

                        const barX = relojX - 12;
                        const barY = relojY - 5;
                        const barW = 24;
                        const barH = 300;
                        const borderRadius = barW / 2;
                        ctx.fillStyle = '#555';
                        ctx.beginPath();
                        ctx.roundRect(barX, barY, barW, barH, borderRadius);
                        ctx.fill();
                        const progress = timeLeft / MAX_TIME;
                        const fillHeight = barH * (1 - Math.sqrt(1 - progress));
                        ctx.fillStyle = '#ffaa00';
                        if (fillHeight > 0) {
                            ctx.beginPath();
                            ctx.roundRect(barX, barY + barH - fillHeight, barW, fillHeight, borderRadius);
                            ctx.fill();
                        }

                        ctx.save();
                        ctx.shadowColor = '#ffd700';
                        ctx.shadowBlur = 15;
                        ctx.beginPath();
                        ctx.arc(relojX, relojY, radio, 0, 2 * Math.PI);
                        ctx.fillStyle = '#ffd700';
                        ctx.fill();
                        ctx.strokeStyle = '#b8860b';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                        ctx.translate(relojX, relojY);
                        ctx.save();
                        const angle = -Math.PI/2 - (timeLeft / MAX_TIME) * 2 * Math.PI * 70;
                        ctx.rotate(angle);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(radio * 0.8, 0);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.restore();
                        ctx.save();
                        const hourAngle = -Math.PI/2 - (timeLeft / MAX_TIME) * 2 * Math.PI * 70 / 12;
                        ctx.rotate(hourAngle);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(radio * 0.5, 0);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 4;
                        ctx.stroke();
                        ctx.restore();
                        ctx.restore();
                    }
                } else if (penaltyActive) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.fillText('Tiempo agotado. Penalización:', 150, 150);
                    const minutos = Math.floor(penaltyTimeLeft / 60);
                    const segundos = Math.floor(penaltyTimeLeft % 60);
                    ctx.fillText(`${minutos}:${segundos < 10 ? '0' : ''}${segundos} restantes`, 200, 200);
                } else if (isConsuming) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.fillText('Consumiendo energía...', 200, 200);
                } else if (pendingMove && pendingMove.tipo === 'simple' && pendingMove.direccion === 'derecha') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
                    ctx.font = 'bold 24px "Segoe UI", sans-serif';
                    ctx.fillStyle = 'white';
                    ctx.fillText('Sin avance, reintentando...', 200, 200);
                }

                // --- MARCADOR DE BATERÍA ---
                const margin = 20;
                const iconSize = 40;
                const textX = CANVAS_W - margin - iconSize - 40;
                const iconX = CANVAS_W - margin - iconSize;
                const y = margin;

                ctx.font = 'bold 28px "Segoe UI", monospace';
                ctx.fillStyle = 'white';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText(Math.round(energy).toString(), textX, y + 32);
                ctx.shadowBlur = 0;

                if (bateriaImg.complete && bateriaImg.naturalWidth > 0) {
                    ctx.drawImage(bateriaImg, iconX, y, iconSize, iconSize);
                } else {
                    ctx.fillStyle = '#888';
                    ctx.fillRect(iconX, y, iconSize, iconSize);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(iconX, y, iconSize, iconSize);
                }

                // Dibujar rayos
                if (lightningAnim.active) {
                    const x = lightningAnim.fromX + (lightningAnim.toX - lightningAnim.fromX) * lightningAnim.progress;
                    const y = lightningAnim.fromY + (lightningAnim.toY - lightningAnim.fromY) * lightningAnim.progress;
                    ctx.font = '40px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#FFD700';
                    ctx.shadowColor = '#FFA500';
                    ctx.shadowBlur = 10;
                    ctx.fillText('⚡', x - 20, y - 20);
                    ctx.shadowBlur = 0;
                }
                if (reverseLightning.active) {
                    const x = reverseLightning.fromX + (reverseLightning.toX - reverseLightning.fromX) * reverseLightning.progress;
                    const y = reverseLightning.fromY + (reverseLightning.toY - reverseLightning.fromY) * reverseLightning.progress;
                    ctx.font = '40px "Segoe UI", sans-serif';
                    ctx.fillStyle = '#FFD700';
                    ctx.shadowColor = '#FFA500';
                    ctx.shadowBlur = 10;
                    ctx.fillText('⚡', x - 20, y - 20);
                    ctx.shadowBlur = 0;
                }
            }

            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
